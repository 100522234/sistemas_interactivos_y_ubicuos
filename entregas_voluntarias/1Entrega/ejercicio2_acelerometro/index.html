<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2: Acelerómetro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; height: 100vh; width: 100vw; }
        #destino { position: absolute; width: 80px; height: 80px; background-color: #2ecc71; border-radius: 10px; top: 20%; left: 70%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; }
        #bola { position: absolute; width: 50px; height: 50px; background-color: #e74c3c; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        #info { position: fixed; bottom: 10px; left: 10px; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 5px; font-size: 14px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div id="destino">META</div>
    <div id="bola"></div>
    <div id="info">
        Pitch (Adelante/Atras): <span id="pitch">0</span>°<br>
        Roll (Lados): <span id="roll">0</span>°
    </div>
    <script src="funciones.js"></script>
</body>
</html>
